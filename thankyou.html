<!DOCTYPE html>
<html>
<head>
  <title>Thank You</title>
  <style>
    body { text-align:center; margin-top:150px; font-family:Arial; }
    .heart { color:red; font-size:60px; animation: pulse 1s infinite; }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <h1>Thank you so much ❤️</h1>
  <div class="heart">❤</div>
</body>
</html>
