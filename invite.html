<!DOCTYPE html>
<html>
<head>
  <title>Date Invite</title>
  <style>
    body { text-align:center; font-family:Arial; margin-top:100px; }
    button { padding:10px 20px; margin:20px; font-size:18px; }
    .yes { background:#ff4081; color:white; }
    .no { background:#555; color:white; position:absolute; }
  </style>
</head>
<body>
  <h1>Wanna go on a date with me?</h1>
  <button class="yes" onclick="window.location.href='schedule.html'">Yes</button>
  <button class="no" id="noBtn">No</button>

  <script>
    const noBtn = document.getElementById("noBtn");
    noBtn.onmouseover = function(){
      const x = Math.random() * (window.innerWidth - 100);
      const y = Math.random() * (window.innerHeight - 100);
      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    }
  </script>
</body>
</html>
